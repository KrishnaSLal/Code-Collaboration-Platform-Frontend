<div class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Platform administrator</p>
    <h1>Admin login</h1>
    <p class="subtitle">
      Sign in as the platform administrator responsible for managing users, projects, sessions, executions, and analytics.
    </p>

    <form [formGroup]="adminLoginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="admin-email">Admin email</label>
        <input id="admin-email" type="email" formControlName="email" placeholder="Enter admin email" />
        <small class="error" *ngIf="email?.touched && email?.hasError('required')">Admin email is required</small>
        <small class="error" *ngIf="email?.touched && email?.hasError('email')">Enter a valid email</small>
      </div>

      <div class="form-group">
        <label for="admin-password">Password</label>
        <div class="password-field">
          <input
            id="admin-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter admin password"
          />
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            (click)="togglePasswordVisibility()"
          >
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m3 3 18 18" />
              <path d="M10.7 6.1A10.8 10.8 0 0 1 12 6c6.5 0 10 6 10 6a16.4 16.4 0 0 1-3.1 3.6" />
              <path d="M6.5 6.7C3.6 8.5 2 12 2 12s3.5 6 10 6a10.5 10.5 0 0 0 4.4-.9" />
              <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2" />
            </svg>
          </button>
        </div>
        <small class="error" *ngIf="password?.touched && password?.hasError('required')">Password is required</small>
      </div>

      <div class="message success" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="message error-box" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" [disabled]="loading">{{ loading ? 'Verifying admin...' : 'Login as admin' }}</button>
    </form>

    <p class="footer-text">
      Developer account?
      <a routerLink="/login">Use developer login</a>
    </p>
  </div>
</div>
