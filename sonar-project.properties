sonar.projectKey=codesync-frontend
sonar.projectName=CodeSync Frontend
sonar.projectVersion=0.0.0
sonar.host.url=https://sonarcloud.io

sonar.sourceEncoding=UTF-8
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.exclusions=**/*.spec.ts,**/*.test.ts
sonar.coverage.exclusions=**/*.html,**/*.css,src/main.ts

sonar.javascript.lcov.reportPaths=coverage/codesync-frontend/lcov.info
