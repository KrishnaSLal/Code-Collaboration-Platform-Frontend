name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarqube:
    name: Frontend SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Frontend SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION || 'krishnaslal' }}
            -Dsonar.projectKey=codesync-frontend
            -Dsonar.projectName="CodeSync Frontend"
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/codesync-frontend/lcov.info
            -Dsonar.qualitygate.wait=false

  deploy:
    name: Deploy Frontend
    needs: sonarqube
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH and Build Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Function to install Docker if missing
            install_docker() {
              if ! command -v docker &> /dev/null; then
                echo "Installing Docker..."
                if command -v apt-get &> /dev/null; then
                  sudo apt-get update && sudo apt-get install -y docker.io docker-compose
                elif command -v yum &> /dev/null; then
                  sudo yum update -y && sudo yum install -y docker
                  sudo systemctl start docker
                  sudo systemctl enable docker
                fi
              fi
            }

            install_docker
            mkdir -p ~/CodeSync && cd ~/CodeSync
            
            # Auto-clone or pull Frontend
            if [ ! -d "Code-Collaboration-Platform-frontend" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/Code-Collaboration-Platform-frontend.git
            fi
            cd Code-Collaboration-Platform-frontend && git pull origin main
            
            # Navigate to backend to find docker-compose.yml
            cd ..
            if [ ! -d "Code-Collaboration-Platform-backend" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/Code-Collaboration-Platform-backend.git
            fi
            cd Code-Collaboration-Platform-backend
            
            # Build frontend
            sudo docker compose up --build -d frontend || sudo docker-compose up --build -d frontend
            sudo docker image prune -f
