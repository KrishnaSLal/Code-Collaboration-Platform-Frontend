name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sonarqube:
    name: Frontend SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Frontend SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=codesync-frontend
            -Dsonar.projectName="CodeSync Frontend"
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/codesync-frontend/lcov.info

  deploy:
    name: Deploy Frontend
    needs: sonarqube
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH and Build Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/CodeSync && cd ~/CodeSync
            
            # Auto-clone or pull Frontend
            if [ ! -d "codesync-frontend" ]; then
              git clone https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/codesync-frontend.git
            fi
            cd codesync-frontend && git pull origin main
            
            # Navigate to backend to find docker-compose.yml
            cd ../CodeSync-Backend
            docker-compose up --build -d frontend
            docker image prune -f
